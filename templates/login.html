{% extends "base.html" %}
{% block title %}ログイン — HiiTap{% endblock %}
{% block extra_css %}
<style>
.auth-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:linear-gradient(135deg,#FFF5F0,#FFF0EB,#F5E6E0);}
.auth-card{background:white;border-radius:28px;padding:40px 36px;box-shadow:0 20px 60px rgba(224,112,80,.12);width:100%;max-width:420px;}
.auth-logo{text-align:center;margin-bottom:32px;font-family:'Sora',sans-serif;font-weight:800;font-size:2rem;color:var(--brand);}
.auth-logo small{display:block;font-size:.85rem;color:var(--ink-light);font-weight:400;margin-top:4px;}
.auth-footer{text-align:center;margin-top:20px;font-size:.85rem;color:var(--ink-light);}
.auth-footer a{color:var(--brand);font-weight:600;text-decoration:none;}
</style>
{% endblock %}
{% block content %}
<div class="auth-wrap"><div class="auth-card">
  <div class="auth-logo">♥ HiiTap <small>「ありがとう」を価値に変える</small></div>
  <form method="POST">
    <div class="input-group"><label>メールアドレス</label><input type="email" name="email" placeholder="you@example.com" required></div>
    <div class="input-group"><label>パスワード</label><input type="password" name="password" placeholder="••••••••" required></div>
    <button type="submit" class="btn btn-primary btn-full" style="margin-top:8px">ログイン</button>
  </form>
  <div class="auth-footer">アカウントをお持ちでない方は <a href="{{ url_for('register') }}">無料で登録</a></div>
  <div class="auth-footer" style="margin-top:10px;font-size:.75rem;color:#aaa">デモ: demo@hiitap.com / demo1234</div>
</div></div>
{% endblock %}
